openapi: "3.0.0"
info:
  title: Invoices API
  version: "1.0.0"
paths:
  /invoices/{id}:
    get:
      summary: Get an invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invoice found
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  amount:
                    type: integer
                    description: Invoice amount in cents
                  tax_amount:
                    type: integer
                    description: Tax amount in cents
